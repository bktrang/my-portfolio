<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact Me</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Bryan Trang</h1>
        <p>Get in Touch</p>
    </header>

    <section>
        <h2>Contact Information</h2>
        <p>
            Feel free to reach out to me for collaborations, project inquiries, or just to connect!
        </p>
        <ul>
            <li>Email: bktrang@my.waketech.edu</li>
            <li>Phone: (919) 825-7372</li>
            <li>Location: Raleigh, North Carolina</li>
        </ul>
    </section>

    <section>
        <h2>Send Me a Message</h2>
        <form action="#" method="post">
            <label for="name">Name:</label><br>
            <input type="text" id="name" name="name" required><br><br>

            <label for="email">Email:</label><br>
            <input type="email" id="email" name="email" required><br><br>

            <label for="message">Message:</label><br>
            <textarea id="message" name="message" rows="5" required></textarea><br><br>

            <button type="submit">Send Message</button>
        </form>
    </section>

    <footer>
        <p>© 2026 Bryan Trang</p>
    </footer>

</body>
</html>
